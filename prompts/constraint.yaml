# Constraint-following challenges — programmatic verification

# ── Tier 1: basic format compliance ────────────────────────────────────────
- name: constraint_capitals
  tier: 1
  style: direct
  system: structured
  prompt: "List exactly 5 US state capitals, one per line, numbered 1 through 5."
  scorer: constraint
  constraints:
    - name: "has 5 numbered lines"
      check: numbered_lines
      from: 1
      to: 5
    - name: "has no 6th item"
      check: no_numbered_line
      line: 6

- name: constraint_json
  tier: 1
  style: direct
  system: structured
  prompt: 'Output a JSON object with exactly 3 keys: "name", "age", "city". All values must be strings. Output only the JSON, nothing else.'
  scorer: constraint
  constraints:
    - name: "valid JSON"
      check: valid_json
    - name: "has required keys"
      check: json_has_keys
      keys: ["name", "age", "city"]
    - name: "all values are strings"
      check: json_all_string_values

- name: constraint_keywords
  tier: 1
  style: direct
  system: structured
  prompt: "Write one paragraph about space exploration. You MUST include the words 'rocket', 'orbit', and 'gravity'."
  scorer: constraint
  constraints:
    - name: "contains 'rocket'"
      check: contains
      value: "rocket"
    - name: "contains 'orbit'"
      check: contains
      value: "orbit"
    - name: "contains 'gravity'"
      check: contains
      value: "gravity"

- name: constraint_no_letter_e
  tier: 1
  style: direct
  system: structured
  prompt: "Write a sentence about a cat. The sentence must NOT contain the letter 'e' anywhere."
  scorer: constraint
  constraints:
    - name: "no letter e"
      check: not_contains_char
      char: "e"
    - name: "is a sentence"
      check: min_length
      length: 10

# ── Tier 2: harder constraints, varied framing ─────────────────────────────
- name: constraint_json_nested
  tier: 2
  style: structured
  system: structured
  prompt: >-
    Output a JSON object representing a person with:
    "name" (string), "age" (number), "address" (object with "street", "city", "zip").
    Use realistic values. Output only valid JSON.
  scorer: constraint
  constraints:
    - name: "valid JSON"
      check: valid_json
    - name: "has name"
      check: json_has_keys
      keys: ["name"]
    - name: "has nested address"
      check: json_nested_is_object
      key: "address"
    - name: "address has city"
      check: json_nested_has_key
      parent: "address"
      key: "city"

- name: constraint_keywords
  tier: 2
  style: adversarial
  system: structured
  prompt: >-
    Write one paragraph about the ocean. You MUST include ALL of these words:
    'current', 'pressure', 'salinity', 'bioluminescence', and 'trench'.
    Do not use any word more than once.
  scorer: constraint
  constraints:
    - name: "contains 'current'"
      check: contains
      value: "current"
    - name: "contains 'pressure'"
      check: contains
      value: "pressure"
    - name: "contains 'salinity'"
      check: contains
      value: "salinity"
    - name: "contains 'bioluminescence'"
      check: contains
      value: "bioluminescence"
    - name: "contains 'trench'"
      check: contains
      value: "trench"

- name: constraint_no_letter_e
  tier: 2
  style: adversarial
  system: structured
  prompt: >-
    Write exactly 3 sentences about cooking dinner.
    None of the sentences may contain the letter 'e'.
    Number each sentence 1-3.
  scorer: constraint
  constraints:
    - name: "no letter e"
      check: not_contains_char
      char: "e"
    - name: "has 3 lines"
      check: numbered_line_exists
      line: 3
    - name: "long enough"
      check: min_length
      length: 40

- name: constraint_format_switch
  tier: 2
  style: decomposed
  system: structured
  prompt: |-
    Do these two things in order:
    1. List 3 European countries, as a JSON array of strings.
    2. For each country, write its capital on a new line in the format 'Country: Capital'.

    Output both parts with a blank line between them.
  scorer: constraint
  constraints:
    - name: "has JSON array"
      check: regex
      pattern: '\[.*".*".*\]'
      dotall: true
    - name: "has colon-separated pairs"
      check: regex_count_min
      pattern: '\w+:\s*\w+'
      min: 3

# ── Tier 3: multi-constraint gauntlet ──────────────────────────────────────
- name: constraint_gauntlet
  tier: 3
  style: structured
  system: structured
  prompt: |-
    Write a 4-line poem about the moon. Requirements:
    - Exactly 4 lines
    - Lines 1 and 3 must rhyme
    - Lines 2 and 4 must rhyme
    - Each line must be between 5 and 12 words
    - The word 'moon' must appear exactly once
  scorer: constraint
  constraints:
    - name: "exactly 4 lines"
      check: line_count
      count: 4
    - name: "moon appears once"
      check: word_count_exact
      word: "moon"
      count: 1
    - name: "lines have 5-12 words"
      check: all_lines_word_count
      min: 5
      max: 12

- name: constraint_json_transform
  tier: 3
  style: decomposed
  system: structured
  prompt: |-
    Given this input: {"items": ["apple", "banana", "cherry"]}

    Transform it to: {"items": [{"name": "<item>", "length": <char_count>}], "count": <total>}

    Output only the transformed JSON.
  scorer: constraint
  constraints:
    - name: "valid JSON"
      check: valid_json
    - name: "has count=3"
      check: json_field_equals
      key: "count"
      value: 3
    - name: "has items array"
      check: json_field_is_list
      key: "items"
    - name: "apple length=5"
      check: json_list_item_has
      list_key: "items"
      match_field: "name"
      match_value: "apple"
      check_field: "length"
      check_value: 5
