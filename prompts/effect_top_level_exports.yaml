name: effect_top_level_exports
category: effect-ts
tier: 1
system: direct
prompt: The `effect` npm package exports several top-level modules. Name at least 6 of them (e.g. Effect, Stream, ...). One per line, just the module name.
scorer: constraint
constraints:
- name: lists Effect
  check: regex
  pattern: (?m)^\s*Effect\s*$
- name: lists at least 5 valid modules
  check: regex_count_min
  pattern: (?m)^\s*(Effect|Stream|Sink|Queue|Ref|Layer|Context|Config|Schedule|Schema|Data|Option|Either|Cause|Exit|Fiber|Scope|Runtime|Match|Logger|Chunk|Duration|HashMap|HashSet|STM|PubSub|Pool|Deferred|FiberRef|Metric|Clock|Random|Order|Predicate|String|Number|Boolean|ReadonlyArray|Record|Struct|Tuple|Types|Function|Brand|Encoding|DateTime|Micro|ManagedRuntime|Mailbox|RcRef|Tracer|Cron|Inspectable|Pipeable)\s*$
  min: 5
tags:
  - TODO
  - code-synthesis
