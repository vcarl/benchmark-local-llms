- name: math_word_problem
  tier: 2
  style: structured
  system: structured
  prompt: |-
    A baker makes 4 batches of cookies. Each batch has 36 cookies.
    She gives away 1/3 of all the cookies. How many does she have left?

    Respond with exactly this JSON: {"answer": <number>}
  scorer: exact_match
  expected: "96"
  extract: '"answer"\s*:\s*(\d+)'

- name: math_primes_sum
  tier: 2
  style: adversarial
  system: adversarial
  prompt: >-
    What is the sum of all prime numbers less than 20?
    Remember, 1 is not a prime number and 2 is the only even prime.
    Also note that 20 itself should not be included.
    Reply with just the number.
  scorer: exact_match
  expected: "77"
  extract: '(\d+)'

- name: math_word_problem
  tier: 2
  style: decomposed
  system: direct
  prompt: |-
    Solve this step by step:
    1. A baker makes 4 batches of cookies, 36 per batch. How many total?
    2. She gives away 1/3. How many given away?
    3. How many left?

    Reply with ONLY the final number from step 3.
  scorer: exact_match
  expected: "96"
  extract: '(\d+)'

# ── Tier 3: harder math ────────────────────────────────────────────────────
- name: math_compound_interest
  tier: 3
  style: direct
  system: direct
  prompt: >-
    You invest $1000 at 10% annual interest compounded once per year.
    How much do you have after 3 years, rounded to the nearest dollar?
    Reply with just the number.
  scorer: exact_match
  expected: "1331"
  extract: '(\d[\d,]*)'

- name: math_combinatorics
  tier: 3
  style: cot
  system: cot
  prompt: "How many ways can you choose 3 items from a set of 7? Think step by step, then write ANSWER: followed by just the number."
  scorer: exact_match
  expected: "35"
  extract: 'ANSWER:\s*(\d+)'

- name: math_modular
  tier: 3
  style: structured
  system: structured
  prompt: |-
    What is (17^3) mod 13?
    Respond with exactly: {"result": <number>}
  scorer: exact_match
  expected: "4"
  extract: '"result"\s*:\s*(\d+)'
