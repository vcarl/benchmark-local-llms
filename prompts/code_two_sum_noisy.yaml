name: code_two_sum_noisy
category: code
tier: 2
system: code_direct
prompt: I need a function for a leetcode problem I'm stuck on. Function called two_sum, takes a list of ints and a target int, returns the indices of the two numbers that add up to the target. There's always exactly one answer. Please just give me the function.
scorer: code_exec
test_code: |
  result = two_sum([2, 7, 11, 15], 9)
  assert sorted(result) == [0, 1]
  result = two_sum([3, 2, 4], 6)
  assert sorted(result) == [1, 2]
  result = two_sum([3, 3], 6)
  assert sorted(result) == [0, 1]
