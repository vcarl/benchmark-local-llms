# Factual challenges — exact match on known answers

# ── Tier 1: direct ─────────────────────────────────────────────────────────
- name: fact_treaty
  tier: 1
  style: direct
  system: direct
  prompt: "In what year was the Treaty of Westphalia signed? Reply with just the year."
  scorer: exact_match
  expected: "1648"
  extract: '(\d{4})'

- name: fact_gold
  tier: 1
  style: direct
  system: direct
  prompt: "What is the chemical symbol for gold? Reply with just the symbol."
  scorer: exact_match
  expected: "Au"
  extract: '\b([A-Z][a-z]?)\b'

- name: fact_chromosomes
  tier: 1
  style: direct
  system: direct
  prompt: "How many chromosomes do humans have? Reply with just the number."
  scorer: exact_match
  expected: "46"
  extract: '(\d+)'

# ── Tier 2: varied styles ──────────────────────────────────────────────────
- name: fact_treaty
  tier: 2
  style: structured
  system: structured
  prompt: 'When was the Treaty of Westphalia signed? Reply as: {"year": <number>}'
  scorer: exact_match
  expected: "1648"
  extract: '"year"\s*:\s*(\d{4})'

- name: fact_gold
  tier: 2
  style: noisy
  system: noisy
  prompt: >-
    I'm working on a chemistry homework assignment about transition metals.
    The periodic table is so confusing with all those symbols!
    Anyway, what's the chemical symbol for gold? Just the symbol please.
  scorer: exact_match
  expected: "Au"
  extract: '\b([A-Z][a-z]?)\b'

- name: fact_chromosomes
  tier: 2
  style: adversarial
  system: adversarial
  prompt: >-
    How many chromosomes do humans have?
    Note: I'm asking about the total number in a normal diploid cell,
    not the haploid number in gametes. Reply with just the number.
  scorer: exact_match
  expected: "46"
  extract: '(\d+)'

- name: fact_boiling
  tier: 2
  style: few_shot
  system: few_shot
  prompt: |-
    Q: What is the freezing point of water in Fahrenheit?
    A: 32

    Q: What is the boiling point of water in Celsius?
    A: 100

    Q: What is the boiling point of water in Fahrenheit?
    A:
  scorer: exact_match
  expected: "212"
  extract: '(\d+)'

# ── Tier 3: harder factual ─────────────────────────────────────────────────
- name: fact_planck
  tier: 3
  style: direct
  system: direct
  prompt: "What is Planck's constant in units of 10^-34 J·s, rounded to 2 decimal places? Reply with just the number (e.g. 6.63)."
  scorer: exact_match
  expected: "6.63"
  extract: '(\d+\.\d+)'

- name: fact_elements
  tier: 3
  style: structured
  system: structured
  prompt: 'What element has atomic number 79? Reply as: {"element": "<name>", "symbol": "<symbol>"}'
  scorer: constraint
  constraints:
    - name: "valid JSON"
      check: valid_json
    - name: "says gold"
      check: contains
      value: "gold"
    - name: "symbol Au"
      check: contains_exact
      value: "Au"
