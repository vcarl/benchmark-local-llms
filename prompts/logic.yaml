# Logic puzzle challenges — trick questions and reasoning

# ── Tier 1: direct ─────────────────────────────────────────────────────────
- name: logic_sheep
  tier: 1
  style: direct
  system: direct
  prompt: "A farmer has 17 sheep. All but 9 die. How many sheep are left? Reply with just the number."
  scorer: exact_match
  expected: "9"
  extract: '(\d+)'

- name: logic_widgets
  tier: 1
  style: direct
  system: direct
  prompt: >-
    If it takes 5 machines 5 minutes to make 5 widgets,
    how many minutes does it take 100 machines to make 100 widgets?
    Reply with just the number.
  scorer: exact_match
  expected: "5"
  extract: '(\d+)'

- name: logic_bat_ball
  tier: 1
  style: direct
  system: direct
  prompt: >-
    A bat and a ball cost $1.10 together.
    The bat costs $1.00 more than the ball.
    How much does the ball cost in cents? Reply with just the number.
  scorer: exact_match
  expected: "5"
  extract: '(\d+)'

# ── Tier 2: varied styles ──────────────────────────────────────────────────
- name: logic_sheep
  tier: 2
  style: cot
  system: cot
  prompt: >-
    A farmer has 17 sheep. All but 9 die. How many sheep are left?
    Think carefully about the wording, then write ANSWER: followed by the number.
  scorer: exact_match
  expected: "9"
  extract: 'ANSWER:\s*(\d+)'

- name: logic_widgets
  tier: 2
  style: adversarial
  system: adversarial
  prompt: >-
    Here's a tricky one. If it takes 5 machines 5 minutes to make 5 widgets,
    how many minutes would it take 100 machines to make 100 widgets?
    Hint: the answer is NOT 100. Reply with just the number.
  scorer: exact_match
  expected: "5"
  extract: '(\d+)'

- name: logic_bat_ball
  tier: 2
  style: noisy
  system: noisy
  prompt: >-
    OK so my math teacher gave us this problem and half the class got it wrong lol.
    A bat and a ball cost $1.10 together and the bat is $1.00 more than the ball.
    Everyone keeps saying 10 cents but that's wrong right??
    What does the ball actually cost in cents? Just the number.
  scorer: exact_match
  expected: "5"
  extract: '(\d+)'

- name: logic_sheep
  tier: 2
  style: few_shot
  system: few_shot
  prompt: |-
    Q: A classroom has 30 students. All but 12 go home. How many are left?
    A: 12

    Q: A parking lot has 50 cars. All but 23 drive away. How many remain?
    A: 23

    Q: A farmer has 17 sheep. All but 9 die. How many are left?
    A:
  scorer: exact_match
  expected: "9"
  extract: '(\d+)'

# ── Tier 3: harder logic ───────────────────────────────────────────────────
- name: logic_ages
  tier: 3
  style: cot
  system: cot
  prompt: >-
    Alice is twice as old as Bob. In 10 years, Alice will be 1.5 times as old as Bob.
    How old is Bob now? Think step by step, then write ANSWER: followed by the number.
  scorer: exact_match
  expected: "20"
  extract: 'ANSWER:\s*(\d+)'

- name: logic_sequence
  tier: 3
  style: direct
  system: direct
  prompt: "What is the next number in this sequence: 1, 1, 2, 3, 5, 8, 13, 21, __? Reply with just the number."
  scorer: exact_match
  expected: "34"
  extract: '(\d+)'

- name: logic_door
  tier: 3
  style: structured
  system: structured
  prompt: |-
    There are 3 doors. Behind one is a prize. You pick door 1.
    The host (who knows what's behind each door) opens door 3, showing no prize.
    Should you switch to door 2 or stay with door 1?
    Reply as: {"action": "switch" or "stay", "reason": "one sentence"}
  scorer: constraint
  constraints:
    - name: "valid JSON"
      check: valid_json
    - name: "says switch"
      check: contains
      value: "switch"
